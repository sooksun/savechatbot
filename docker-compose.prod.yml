services:
  app:
    build: .
    image: savechatbot:latest
    container_name: savechatbot
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      # allows DB_HOST=host.docker.internal to reach the MariaDB container
      # that publishes 3306 on the host
      - "host.docker.internal:host-gateway"
    volumes:
      - /DATA/AppData/www/savechatbot/storage:/app/storage
    ports:
      - "127.0.0.1:9920:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
