# /etc/nginx/sites-available/savechatbot.conf
# After installing: ln -s /etc/nginx/sites-available/savechatbot.conf /etc/nginx/sites-enabled/
# Then: certbot --nginx -d savechatbot.example.com
server {
    listen 80;
    server_name savechatbot.example.com;

    client_max_body_size 25m;

    # LINE webhook + dashboard + media all proxied to the app
    location / {
        proxy_pass         http://127.0.0.1:9920;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
