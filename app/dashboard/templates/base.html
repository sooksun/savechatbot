<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}GetChatBot Dashboard{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --bg:#0f172a; --fg:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --card:#1e293b; --border:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: "Kanit", sans-serif; background:var(--bg); color:var(--fg); }
    header { background:#020617; padding:12px 20px; border-bottom:1px solid var(--border); display:flex; gap:16px; align-items:center; }
    header a { color:var(--fg); text-decoration:none; padding:6px 10px; border-radius:6px; }
    header a:hover, header a.active { background:var(--card); color:var(--accent); }
    main { padding:20px; max-width:1200px; margin:0 auto; }
    h1,h2,h3 { color:#f1f5f9; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
    .grid { display:grid; gap:16px; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    table { width:100%; border-collapse:collapse; }
    th,td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
    th { color:var(--muted); font-size:13px; font-weight:600; }
    input, select, textarea, button { font:inherit; padding:6px 10px; border-radius:6px; border:1px solid var(--border); background:#0b1220; color:var(--fg); }
    button { background:var(--accent); color:#0b1220; border:none; cursor:pointer; font-weight:600; }
    button.secondary { background:#334155; color:var(--fg); }
    .tag { display:inline-block; padding:2px 8px; border-radius:999px; background:#0b1220; border:1px solid var(--border); font-size:12px; color:var(--muted); }
    .kind-youtube{color:#f87171} .kind-google_drive{color:#fbbf24} .kind-canva{color:#a78bfa} .kind-other{color:var(--muted)}
    .muted { color:var(--muted); font-size:13px; }
    form.inline { display:inline; }
    .flex { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .md pre { background:#020617; padding:10px; border-radius:6px; overflow:auto; }
    img.thumb { max-width:180px; max-height:180px; border-radius:6px; border:1px solid var(--border); }
    a { color:var(--accent); }
  </style>
</head>
<body>
  <header>
    <strong style="color:var(--accent)">GetChatBot</strong>
    <a href="/">ภาพรวม</a>
    <a href="/messages">ข้อความ</a>
    <a href="/links">ลิงก์</a>
    <a href="/summaries">สรุป</a>
    <a href="/categories">หมวดหมู่</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
